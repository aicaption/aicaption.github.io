<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AI Caption Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', secondary: '#7c3aed', dark: '#0f172a', 'dark-card': '#1e293b' }
                }
            }
        }
    </script>
    <style>
        .gradient-text { background: linear-gradient(90deg, #4f46e5, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .cosmic-pattern { background-image: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.1) 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark text-gray-800 dark:text-gray-200 transition-colors duration-300 cosmic-pattern">

    <div id="header-placeholder"></div>

    <main class="py-16">
        <div class="container mx-auto px-4 max-w-2xl">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-bold mb-4">Get in <span class="gradient-text">Touch</span></h1>
                <p class="text-gray-600 dark:text-gray-400">Have questions? Our AI-powered team is ready to help.</p>
            </div>

            <form class="bg-white dark:bg-dark-card rounded-2xl p-8 shadow-xl border border-gray-200 dark:border-gray-700">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Name</label>
                        <input type="text" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Email</label>
                        <input type="email" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Message</label>
                        <textarea rows="4" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary"></textarea>
                    </div>
                    <button type="submit" class="w-full gradient-bg text-white font-bold py-3 rounded-lg hover:opacity-90 transition">
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
